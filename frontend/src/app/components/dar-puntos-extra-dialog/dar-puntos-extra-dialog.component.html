<div class="dialog-container">
  <div class="dialog-header">
    <h2 class="dialog-title">Modificar Puntos</h2>
    <p class="dialog-subtitle">Dar o quitar puntos al perro seleccionado</p>
  </div>

  <div class="dialog-content">
    <div class="form-group">
      <label for="dogSelect">Selecciona un Perro:</label>
      <select id="dogSelect" [(ngModel)]="selectedDogId" [disabled]="isLoading">
        <option [ngValue]="null" disabled selected>-- Elige un perro --</option>
        @for (dog of dogs(); track dog) {
          <option [ngValue]="dog.id">{{ dog.name }} ({{ getOwnerName(dog) }})</option>
        }
      </select>
      @if (dogs().length === 0 && !isLoading) {
        <small>No hay perros disponibles.</small>
      }
    </div>

    <div class="form-group">
      <label>Acción:</label>
      <div class="radio-group">
        <label>
          <input type="radio" name="action" [(ngModel)]="action" (ngModelChange)="onActionChange()" value="add" [disabled]="isLoading">
          <i class="fas fa-plus-circle" style="margin-right: 6px;"></i> Dar Puntos
        </label>
        <label>
          <input type="radio" name="action" [(ngModel)]="action" (ngModelChange)="onActionChange()" value="remove" [disabled]="isLoading">
          <i class="fas fa-minus-circle" style="margin-right: 6px;"></i> Quitar Puntos
        </label>
      </div>
    </div>

    <div class="form-group">
      <label for="categorySelect">Categoría a valorar:</label>
      <select id="categorySelect" [(ngModel)]="selectedCategory" [disabled]="isLoading">
        <option value="" disabled selected>-- Selecciona categoría --</option>
        @for (cat of categories; track cat) {
          <option [value]="cat">{{ getEmoji(cat) }} {{ cat }}</option>
        }
      </select>
    </div>

    @if (selectedCategory === 'Otro') {
      <div class="form-group">
        <label for="customCategoryInput">Especifica la categoría:</label>
        <input type="text" id="customCategoryInput" [(ngModel)]="customCategory" [disabled]="isLoading" placeholder="Ej: Esfuerzo, Simpatía...">
      </div>
    }

    <div class="form-group">
      <label for="pointsInput">Cantidad de puntos (1 a 3):</label>
      <select id="pointsInput" [(ngModel)]="selectedPoints" [disabled]="isLoading">
        <option [ngValue]="1">1 Punto</option>
        <option [ngValue]="2">2 Puntos</option>
        <option [ngValue]="3">3 Puntos</option>
      </select>
    </div>
  </div>

  <div class="dialog-actions">
    <button class="cancel-btn" (click)="onCancel()" [disabled]="isLoading">Cancelar</button>
    <button class="submit-btn" (click)="onSubmit()" [disabled]="!isFormValid() || isLoading" [ngClass]="{'remove-btn': action === 'remove'}">
      @if (isLoading) {
        <i class="fas fa-spinner fa-spin" style="margin-right: 8px;"></i>
      }
      @if (!isLoading) {
        <i class="fas fa-check" style="margin-right: 8px;"></i>
      }
      {{ isLoading ? 'Guardando...' : (action === 'add' ? 'Dar Puntos' : 'Quitar Puntos') }}
    </button>
  </div>
</div>
