<button class="help-btn" (click)="openHelpModal()" [title]="titulo">
  <span class="material-icons" style="font-size: 18px;">help_outline</span> Instrucciones
</button>

@if (isHelpModalOpen()) {
  <div class="modal-backdrop" style="z-index: 9999; padding: 80px 24px 24px 24px; box-sizing: border-box; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex;" (click)="closeHelpModal($event)">
    <div class="modal-content" style="width: 100%; max-width: 600px; height: auto; max-height: 85vh; border-radius: 24px; overflow-y: auto; background: white; margin: auto; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);" (click)="$event.stopPropagation()">
      <div class="modal-header header-light" style="padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; background: white; z-index: 10;">
        <h3 style="margin: 0; color: #1e293b; display: flex; align-items: center; gap: 8px; font-size: 1.25rem; font-weight: 800;">
          <span class="material-icons" style="color: #3b82f6;">help_outline</span> {{ titulo }}
        </h3>
        <button class="btn-icon close-btn" (click)="closeHelpModal()" title="Cerrar" style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #64748b; transition: all 0.2s;">
          <span class="material-icons" style="font-size: 18px;">close</span>
        </button>
      </div>
      <div class="modal-body" style="padding: 1.5rem; color: #334155; line-height: 1.6; text-align: left;">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
}
