<h2 mat-dialog-title>Reportar Bug o Sugerencia</h2>
<mat-dialog-content>
  <p class="dialog-description">
    Ayúdanos a mejorar Agility Asturias. ¿Has encontrado algún fallo o tienes una idea para una nueva funcionalidad?
  </p>

  <div class="form-group">
    <label for="type">Tipo de reporte</label>
    <select id="type" [(ngModel)]="type" class="form-control">
      <option value="suggestion">Sugerencia de mejora</option>
      <option value="bug">Reportar un error (Bug)</option>
    </select>
  </div>

  <div class="form-group">
    <label for="content">Descripción</label>
    <textarea id="content" [(ngModel)]="content" rows="4" class="form-control" 
      placeholder="Describe con detalle tu sugerencia o el error que has encontrado..."
      maxlength="1000"></textarea>
    <div class="char-count">{{content.length}}/1000</div>
  </div>

</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()" class="btn btn-secondary">Cancelar</button>
  <button mat-button (click)="submit()" color="primary" class="btn btn-primary" [disabled]="!content || isSubmitting">
    {{ isSubmitting ? 'Enviando...' : 'Enviar Reporte' }}
  </button>
</mat-dialog-actions>
