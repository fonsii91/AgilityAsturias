<header class="landing-header glass-header">
  <div class="logo" (click)="changeView('home')" style="cursor: pointer;">
    <img src="ClubAgilityBlue.png" alt="Club Agility Logo" class="logo-image">
    <span class="logo-text">Club Agility</span>
  </div>
  
  <nav class="saas-nav">
    <button 
      class="nav-item" 
      [class.active]="currentView === 'home'" 
      (click)="changeView('home')">
      Inicio
    </button>
      <button 
      class="nav-item" 
      [class.active]="currentView === 'features'" 
      (click)="changeView('features')">
      Características
    </button>
    <button 
      class="nav-item join-btn" 
      [class.active]="currentView === 'join'" 
      (click)="changeView('join')">
      Únete Ahora
    </button>
  </nav>
</header>
